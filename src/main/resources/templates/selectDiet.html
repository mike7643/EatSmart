<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>식단 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 1000px;
            transition: all 0.3s ease-in-out;
        }
        .container:hover {
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        }
        .custom-navbar {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2em;
            color: #333333;
            margin: 10px 0;
            transition: color 0.3s ease-in-out;
        }
        h1:hover {
            color: #000000;
        }
        h2 {
            font-size: 1.5em;
            color: #333333;
            margin: 20px 0;
        }
        form {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        .input-group input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            margin-right: 10px;
            transition: border-color 0.3s ease-in-out;
        }
        .input-group input:focus {
            border-color: #000000;
        }
        .input-group button {
            padding: 12px 20px;
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
        }
        .input-group button:hover {
            background-color: #333333;
        }
        .food-section {
            border: 1px solid #cccccc;
            border-radius: 4px;
            padding: 20px;
            margin-top: 20px;
            background-color: #f9f9f9;
        }
        .food-section h3 {
            margin: 0 0 15px 0;
            font-size: 1.3em;
            color: #333333;
        }
        .btn-secondary, .btn-primary {
            padding: 12px 20px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
            text-align: center;
        }
        .btn-secondary {
            background-color: #000000;
        }
        .btn-primary {
            background-color: #000000;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background-color: #333333;
        }
        .btn-primary:hover {
            background-color: #333333;
        }
        .btn-back {
            margin-top: 20px;
            padding: 12px 20px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
            text-align: center;
        }
        .btn-back:hover {
            background-color: #d32f2f;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .table th, .table td {
            border: 1px solid #cccccc;
            padding: 12px;
            text-align: center;
            transition: background-color 0.3s ease-in-out;
        }
        .table th {
            background-color: #f2f2f2;
        }
        .table tr:hover {
            background-color: #f1f1f1;
        }
        .table a {
            color: #000000;
            text-decoration: none;
            transition: color 0.3s ease-in-out;
        }
        .table a:hover {
            color: #333333;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
        }
        .btn-delete:hover {
            background-color: #c82333;
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .input-group {
                flex-direction: column;
                align-items: stretch;
            }
            .input-group input {
                margin-bottom: 10px;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 커스텀 네비게이션 바 -->
    <div class="custom-navbar">
        <h1 th:if="${currentURI == '/add/breakfast'}">
            <strong>✅ 아침 메뉴 선택하기✅</strong></h1>
        <h1 th:if="${currentURI == '/add/lunch'}">
            <strong>✅ 점심 메뉴 선택하기✅</strong></h1>
        <h1 th:if="${currentURI == '/add/dinner'}">
            <strong>✅ 저녁 메뉴 선택하기 ✅</strong></h1>
    </div>

    <div class="text-center">
        <h2>음식 목록</h2>
    </div>

    <form th:object="${foodSearch}" method="get" class="form-inline">
        <div class="input-group">
            <input type="text" th:field="*{foodName}" class="form-control" placeholder="상품명을 입력하세요"/>
            <button type="submit" class="btn btn-secondary">검색</button>
        </div>
        <div class="input-group">
            <button class="btn btn-primary" th:onclick="|location.href='@{/foods/add/food}'|" type="button">상품 등록</button>
        </div>
    </form>
    <hr class="my-4">
    <button class="btn-back" onclick="location.href='/add'">식단 보기</button>

    <div class="food-section">
        <h3>검색 결과</h3>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>이름</th>
                <th>칼로리</th>
                <th>단백질</th>
                <th>지방</th>
                <th>탄수화물</th>
                <th>설탕</th>
                <th>나트륨</th>
                <th>콜레스테롤</th>
                <th></th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="food : ${foods}">
                <td><a th:href="@{/foods/{foodId}(foodId=${food.foodId})}" th:text="${food.foodId}">음식번호</a></td>
                <td><a th:href="@{|/foods/${food.foodId}|}" th:text="${food.foodName}">음식 이름</a></td>
                <td th:text="${food.foodKcal}">10000</td>
                <td th:text="${food.foodProtein}">10000</td>
                <td th:text="${food.foodFat}">10000</td>
                <td th:text="${food.foodCarbo}">10000</td>
                <td th:text="${food.foodSugar}">10000</td>
                <td th:text="${food.foodNat}">10000</td>
                <td th:text="${food.foodColest}">10000</td>
                <td>
                    <form th:action="@{/meals/addFood}" method="post">
                        <input type="hidden" name="foodId" th:value="${food.foodId}">
                        <button type="submit" class="btn btn-secondary" onclick="return confirm('음식을 식단에 추가합니까?');">선택</button>
                    </form>
                </td>
                <td>
                    <form th:action="@{/foods/{foodId}/delete(foodId=${food.foodId})}" method="post">
                        <button type="submit" class="btn btn-delete" onclick="return confirm('정말 삭제하시겠습니까?');">삭제</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
